
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VIP MAHDI</title>
<style>
body{font-family:Arial;padding:15px}
input,button{padding:10px;margin:5px;font-size:16px}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #ccc;padding:6px}
</style>
</head>
<body>
<h2>VIP MAHDI - حسابات المحل ₪</h2>

<input id="name" placeholder="اسم الزبون">
<input id="amount" type="number" placeholder="المبلغ">
<br>
<button onclick="income()">دخل</button>
<button onclick="expense()">مصروف</button>

<h3>الرصيد: ₪ <span id="bal">0</span></h3>

<table>
<tr><th>الزبون</th><th>النوع</th><th>المبلغ</th></tr>
<tbody id="tbl"></tbody>
</table>

<script>
let bal = Number(localStorage.getItem("bal")||0);
document.getElementById("bal").innerText=bal;

function save(){localStorage.setItem("bal",bal);}

function income(){
 let n=document.getElementById("name").value;
 let a=Number(document.getElementById("amount").value||0);
 bal+=a; save();
 document.getElementById("bal").innerText=bal;
 document.getElementById("tbl").innerHTML += `<tr><td>${n}</td><td>دخل</td><td>₪${a}</td></tr>`;
}
function expense(){
 let n=document.getElementById("name").value;
 let a=Number(document.getElementById("amount").value||0);
 bal-=a; save();
 document.getElementById("bal").innerText=bal;
 document.getElementById("tbl").innerHTML += `<tr><td>${n}</td><td>مصروف</td><td>₪${a}</td></tr>`;
}
</script>
</body>
</html>
